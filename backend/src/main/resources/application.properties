spring.application.name=household-backend

# H2 in-memory (Iteration 1/2 – wird später durch Postgres ersetzt)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT – secret MUSS in Produktion überschrieben werden (min. 32 Bytes)
app.jwt.secret=household-dev-secret-must-be-changed-in-production!!
app.jwt.expiration-ms=2592000000
